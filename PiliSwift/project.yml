name: PiliSwift
options:
  bundleIdPrefix: com.piliswift
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "8.0.0"

targets:
  PiliSwift:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PiliSwift
        excludes:
          - "**/*.md"
    resources:
      - path: PiliSwift/Resources/Assets.xcassets
    info:
      path: PiliSwift/Resources/Info.plist
    entitlements:
      path: PiliSwift/Resources/PiliSwift.entitlements
    settings:
      base:
        SWIFT_VERSION: "5.10"
        PRODUCT_BUNDLE_IDENTIFIER: com.piliswift.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: "YES"
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - package: Kingfisher
    preBuildScripts: []

  PiliSwiftTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PiliSwiftTests
    settings:
      base:
        SWIFT_VERSION: "5.10"
        PRODUCT_BUNDLE_IDENTIFIER: com.piliswift.tests
    dependencies:
      - target: PiliSwift
