name: PiliSwift CI

on:
  push:
    branches: [main]
    paths:
      - 'PiliSwift/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'PiliSwift/**'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Generate Xcode project
        working-directory: PiliSwift
        run: xcodegen generate

      - name: Resolve SPM dependencies
        working-directory: PiliSwift
        run: |
          xcodebuild -resolvePackageDependencies \
            -project PiliSwift.xcodeproj \
            -scheme PiliSwift

      - name: Create iOS Simulator
        run: |
          SIMULATOR_UDID="$(python3 <<'PY'
          import os
          import re
          import json
          import subprocess

          sdk_info = subprocess.check_output(
              ["xcodebuild", "-version", "-sdk", "iphonesimulator"],
              text=True,
          )
          sdk_version_match = re.search(r"SDKVersion:\s+([0-9]+(?:\.[0-9]+)*)", sdk_info)
          if sdk_version_match is None:
              raise SystemExit("Unable to determine supported iOS Simulator SDK version.")

          sdk_version = sdk_version_match.group(1)
          sdk_parts = tuple(int(part) for part in sdk_version.split("."))
          sdk_major = sdk_parts[0]

          runtimes = json.loads(
            subprocess.check_output(
              ["xcrun", "simctl", "list", "runtimes", "--json"],
              text=True,
            )
          )["runtimes"]

          matching_major_compatible_runtimes = []
          matching_major_runtimes = []
          fallback_runtimes = []
          for runtime in runtimes:
            name = runtime.get("name", "")
            if not name.startswith("iOS "):
              continue
            if runtime.get("isAvailable") is False:
              continue

            version = runtime.get("version", "0")
            try:
              sort_key = tuple(int(part) for part in version.split("."))
            except ValueError:
              sort_key = (0,)

            runtime_entry = (sort_key, runtime["identifier"], version)
            if sort_key and sort_key[0] == sdk_major and sort_key <= sdk_parts:
              matching_major_compatible_runtimes.append(runtime_entry)
            elif sort_key and sort_key[0] == sdk_major:
              matching_major_runtimes.append(runtime_entry)
            elif sort_key <= sdk_parts:
              fallback_runtimes.append(runtime_entry)

          candidate_runtimes = (
            matching_major_compatible_runtimes
            or matching_major_runtimes
            or fallback_runtimes
          )
          if not candidate_runtimes:
            raise SystemExit(
              f"No available iOS Simulator runtimes compatible with SDK {sdk_version}."
            )

          _, runtime_id, runtime_version = max(candidate_runtimes)

          device_types = json.loads(
            subprocess.check_output(
              ["xcrun", "simctl", "list", "devicetypes", "--json"],
              text=True,
            )
          )["devicetypes"]

          preferred_names = [
            "iPhone 16",
            "iPhone 16 Pro",
            "iPhone 16 Pro Max",
            "iPhone 15",
            "iPhone 15 Pro",
          ]

          device_type_id = None
          for preferred_name in preferred_names:
            for device_type in device_types:
              if device_type.get("name") == preferred_name:
                device_type_id = device_type["identifier"]
                break
            if device_type_id is not None:
              break

          if device_type_id is None:
            for device_type in device_types:
              if device_type.get("name", "").startswith("iPhone "):
                device_type_id = device_type["identifier"]
                break

          if device_type_id is None:
            raise SystemExit("No iPhone simulator device type found.")

          print(f"Selected iOS Simulator SDK {sdk_version}; using runtime {runtime_version}.", file=os.sys.stderr)
          print(
            subprocess.check_output(
              ["xcrun", "simctl", "create", "PiliSwift-CI", device_type_id, runtime_id],
              text=True,
            ).strip()
          )
          PY
          )"
          echo "SIMULATOR_UDID=${SIMULATOR_UDID}" >> "$GITHUB_ENV"
          xcrun simctl boot "$SIMULATOR_UDID"
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          xcrun simctl list devices available

      - name: Show destinations
        working-directory: PiliSwift
        run: |
          xcodebuild -showdestinations \
            -project PiliSwift.xcodeproj \
            -scheme PiliSwift \
            -sdk iphonesimulator

      - name: Build (iOS Simulator)
        working-directory: PiliSwift
        run: |
          set -o pipefail
          xcodebuild build \
            -project PiliSwift.xcodeproj \
            -scheme PiliSwift \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty

      - name: Run Unit Tests
        working-directory: PiliSwift
        run: |
          set -o pipefail
          xcodebuild test \
            -project PiliSwift.xcodeproj \
            -scheme PiliSwiftTests \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${SIMULATOR_UDID}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty
