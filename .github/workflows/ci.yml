name: PiliSwift CI

on:
  push:
    branches: [main]
    paths:
      - 'PiliSwift/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'PiliSwift/**'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Generate Xcode project
        working-directory: PiliSwift
        run: xcodegen generate

      - name: Resolve SPM dependencies
        working-directory: PiliSwift
        run: |
          xcodebuild -resolvePackageDependencies \
            -project PiliSwift.xcodeproj \
            -scheme PiliSwift

      - name: Resolve destinations
        working-directory: PiliSwift
        run: |
          python3 <<'PY'
          import os
          import re
          import subprocess

          def get_destinations(scheme):
              output = subprocess.check_output(
                  [
                      "xcodebuild",
                      "-showdestinations",
                      "-project",
                      "PiliSwift.xcodeproj",
                      "-scheme",
                      scheme,
                  ],
                  text=True,
                  stderr=subprocess.STDOUT,
              )
              print(f"Available destinations for {scheme}:")
              print(output)

              entries = []
              for record in re.findall(r"\{([^{}]+)\}", output):
                  entry = {}
                  for part in record.split(","):
                      if ":" not in part:
                          continue
                      key, value = part.split(":", 1)
                      entry[key.strip()] = value.strip()
                  entries.append(entry)
              return entries

          def choose_destination(entries):
              for entry in entries:
                  if entry.get("platform") == "macOS" and entry.get("variant") == "Designed for [iPad,iPhone]":
                      arch = entry.get("arch", "arm64")
                      return f"platform=macOS,arch={arch},variant=Designed for [iPad,iPhone]"

              for entry in entries:
                  if entry.get("platform") != "iOS Simulator":
                      continue
                  destination_id = entry.get("id", "")
                  destination_name = entry.get("name", "")
                  if "placeholder" in destination_id or destination_name == "Any iOS Simulator Device":
                      continue
                  return f"platform=iOS Simulator,id={destination_id}"

              return ""

          build_destination = choose_destination(get_destinations("PiliSwift"))
          test_destination = choose_destination(get_destinations("PiliSwiftTests"))

          if not build_destination:
              raise SystemExit("No supported build destination found for PiliSwift.")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              print(f"BUILD_DESTINATION={build_destination}", file=env)
              print(f"TEST_DESTINATION={test_destination}", file=env)
              print(f"RUN_TESTS={'true' if test_destination else 'false'}", file=env)
          PY

      - name: Build
        working-directory: PiliSwift
        run: |
          set -o pipefail
          xcodebuild build \
            -project PiliSwift.xcodeproj \
            -scheme PiliSwift \
            -destination "$BUILD_DESTINATION" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty

      - name: Run Unit Tests
        if: env.RUN_TESTS == 'true'
        working-directory: PiliSwift
        run: |
          set -o pipefail
          xcodebuild test \
            -project PiliSwift.xcodeproj \
            -scheme PiliSwiftTests \
            -destination "$TEST_DESTINATION" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Skip Unit Tests
        if: env.RUN_TESTS != 'true'
        run: echo "No supported test destination found; skipping unit tests."
